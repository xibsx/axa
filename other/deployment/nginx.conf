# /etc/nginx/sites-available/sams

server {
    listen 80;
    server_name sams.xibs.space;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sams.xibs.space;
    
    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/sams.xibs.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sams.xibs.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Root directory
    root /var/www/sams/web;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;
    
    # PWA headers
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache control for HTML
        add_header Cache-Control "no-cache, must-revalidate";
        
        # PWA headers
        add_header Service-Worker-Allowed "/";
    }
    
    # Static assets (long cache)
    location /core/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    location /web/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Service worker (no cache!)
    location /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        expires off;
    }
    
    # Manifest
    location /manifest.json {
        add_header Cache-Control "no-cache";
        add_header Content-Type application/manifest+json;
    }
    
    # Data directory (protected)
    location /data/ {
        internal;  # Not accessible from outside
        alias /var/www/sams/data/;
    }
    
    # API proxy
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # PWA specific headers
    add_header Service-Worker-Allowed "/";
    
    # Logging
    access_log /var/log/nginx/sams_access.log;
    error_log /var/log/nginx/sams_error.log;
}
